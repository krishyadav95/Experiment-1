<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#080A18" />
  <title>Dashboard — Fitnessify AI</title>
  <meta name="description" content="Your personalized wellness dashboard with AI-powered recommendations, chat with Vita, and check-in tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { background: var(--bg); min-height: 100vh; overflow-x: hidden; }

    /* ====  TOP NAV  ==== */
    .dash-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 64px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: var(--bg-nav);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .dash-logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 700; font-size: 1.0625rem; color: var(--text-primary); text-decoration: none; }
    .logo-mark { width: 34px; height: 34px; border-radius: 9px; display: block; object-fit: cover; box-shadow: 0 4px 14px var(--primary-glow); }
    .nav-user { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gradient); display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 0.95rem; flex-shrink: 0;
    }
    .user-name { font-weight: 600; font-size: 0.9rem; color: var(--text-primary); }
    .user-sub  { font-size: 0.75rem; color: var(--text-muted); }

    /* ====  LAYOUT  ==== */
    .dash-body { display: flex; padding-top: 64px; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 240px; flex-shrink: 0; position: fixed; top: 64px; bottom: 0; left: 0;
      background: var(--bg-surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 20px 12px;
      overflow-y: auto; z-index: 50; transition: transform 0.3s var(--ease);
    }

    .sidebar-label { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 12px; margin: 16px 0 8px; }

    .sidebar-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: var(--radius); cursor: pointer;
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 500;
      transition: var(--transition); white-space: nowrap;
      border: none; background: transparent; width: 100%; text-align: left;
      font-family: var(--font-sans);
    }
    .sidebar-item:hover  { background: var(--primary-subtle); color: var(--primary); }
    .sidebar-item.active { background: var(--primary-subtle); color: var(--primary); font-weight: 600; }
    .sidebar-item .s-icon { font-size: 1.05rem; flex-shrink: 0; }
    .sidebar-tag {
      margin-left: auto; font-size: 0.7rem; font-weight: 700;
      background: var(--accent); color: #fff; border-radius: var(--radius-full);
      padding: 2px 7px;
    }

    .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 12px; }

    /* Main content */
    .dash-content { margin-left: 240px; flex: 1; min-height: calc(100vh - 64px); }

    /* Tab panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ====  REPORT TAB  ==== */
    .report-container { padding: 32px; max-width: 1000px; }

    /* Loading */
    .report-loading {
      text-align: center; padding: 80px 40px;
    }
    .loading-orb {
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--gradient); margin: 0 auto 28px;
      animation: pulse 2s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
    }
    .loading-orb::after { content: '🤖'; position: absolute; }
    .report-loading h3 { font-size: 1.4rem; margin-bottom: 8px; }
    .report-loading p  { color: var(--text-secondary); margin-bottom: 28px; }
    .loading-steps { display: flex; flex-direction: column; gap: 10px; max-width: 360px; margin: 0 auto; }
    .loading-step {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 16px; font-size: 0.875rem; color: var(--text-muted); text-align: left;
      transition: var(--transition);
    }
    .loading-step.active { border-color: var(--primary); color: var(--text-primary); background: var(--primary-subtle); }

    /* Report */
    .report-wrapper { padding-bottom: 60px; }
    .report-header {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 24px 28px; margin-bottom: 24px;
    }
    .report-header-left { display: flex; align-items: center; gap: 16px; }
    .report-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--gradient); display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.4rem; color: #fff;
    }
    .report-header h2 { font-size: 1.3rem; margin-bottom: 2px; }
    .report-actions { display: flex; gap: 10px; }

    /* Vita summary */
    .report-summary-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 24px; display: flex; gap: 16px; align-items: flex-start; margin-bottom: 24px;
    }
    .vita-avatar { font-size: 2rem; flex-shrink: 0; }
    .vita-label  { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: 0.06em; margin-bottom: 4px; }
    .vita-message { font-size: 0.9375rem; color: var(--text-secondary); line-height: 1.7; font-style: italic; }

    /* Score section */
    .score-section {
      display: grid; grid-template-columns: 200px 1fr; gap: 24px; align-items: center;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 28px; margin-bottom: 24px;
    }
    @media (max-width: 640px) { .score-section { grid-template-columns: 1fr; } }
    .score-circle {
      width: 160px; height: 160px; border-radius: 50%; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      background: conic-gradient(from 0deg, #6C63FF 0%, #00D9A7 calc(var(--score, 70) * 3.6deg), var(--border-solid) calc(var(--score, 70) * 3.6deg));
      position: relative;
    }
    .score-inner {
      width: 120px; height: 120px; border-radius: 50%;
      background: var(--bg-card); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
    }
    .score-number { font-family: var(--font-display); font-size: 2.4rem; font-weight: 800; background: var(--gradient-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .score-label  { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .score-breakdown { display: flex; flex-direction: column; gap: 14px; }
    .score-bar-item {}
    .score-bar-label { display: flex; justify-content: space-between; align-items: center; font-size: 0.875rem; font-weight: 500; margin-bottom: 5px; }

    /* BMI card */
    .bmi-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 16px 20px; display: flex; align-items: center; gap: 14px;
      margin-bottom: 24px; font-size: 0.9rem;
    }
    .bmi-icon { font-size: 1.5rem; flex-shrink: 0; }

    /* Report section */
    .report-sections { display: flex; flex-direction: column; gap: 24px; }
    .report-section {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); overflow: hidden;
    }
    .section-header {
      display: flex; align-items: flex-start; gap: 16px; padding: 24px 28px 16px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .section-icon { width: 48px; height: 48px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
    .section-title { font-size: 1.125rem; margin-bottom: 4px; }
    .section-summary { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6; }
    .section-priority { margin-left: auto; flex-shrink: 0; }
    .priority-badge { padding: 5px 12px; border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 700; }

    .recommendations-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
    @media (max-width: 720px) { .recommendations-grid { grid-template-columns: 1fr; } }
    .recommendation-card { padding: 20px 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); transition: var(--transition); }
    .recommendation-card:last-child:nth-child(odd) { grid-column: span 2; }
    @media (max-width: 720px) { .recommendation-card:last-child:nth-child(odd) { grid-column: auto; } }
    .recommendation-card:hover { background: var(--primary-subtle); }
    .rec-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .rec-title { font-size: 0.9375rem; font-weight: 700; }
    .rec-badges { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
    .rec-badge { padding: 2px 8px; border-radius: var(--radius-full); font-size: 0.7rem; font-weight: 700; }
    .impact-badge { background: var(--accent-subtle); color: var(--accent-dark); }
    .rec-description { font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 10px; }
    .rec-when { display: flex; align-items: center; gap: 6px; font-size: 0.8125rem; color: var(--primary); font-weight: 600; }

    /* Action plan */
    .action-plan-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 28px; margin-top: 24px;
    }
    .action-plan-card h3 { font-size: 1.125rem; margin-bottom: 4px; }
    .action-weeks { display: flex; flex-direction: column; gap: 14px; }
    .action-week { display: flex; align-items: flex-start; gap: 16px; padding: 16px; background: var(--bg); border-radius: var(--radius); }
    .week-badge {
      background: var(--gradient); color: #fff; border-radius: var(--radius);
      padding: 6px 12px; font-size: 0.8rem; font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .week-content strong { font-size: 0.9375rem; display: block; margin-bottom: 4px; }
    .week-content p { font-size: 0.875rem; color: var(--text-secondary); }

    /* Motivational card */
    .motivational-card {
      background: var(--gradient); border-radius: var(--radius-xl); padding: 28px;
      text-align: center; margin-top: 24px; color: #fff;
    }
    .motivational-emoji { font-size: 2.5rem; margin-bottom: 12px; }
    .motivational-card p { font-size: 0.9375rem; line-height: 1.7; opacity: 0.92; }

    /* Empty state */
    .empty-report { text-align: center; padding: 80px 40px; }
    .empty-icon { font-size: 4rem; margin-bottom: 20px; }
    .empty-report h3 { font-size: 1.4rem; margin-bottom: 8px; }

    .report-footer-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; padding: 24px 0; }

    /* ====  CHAT TAB  ==== */
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 64px); }
    .chat-header { padding: 20px 28px; border-bottom: 1px solid var(--border); background: var(--bg-surface); }
    .chat-header-inner { display: flex; align-items: center; gap: 14px; }
    .vita-bubble { width: 48px; height: 48px; border-radius: 50%; background: var(--gradient); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; animation: pulse 3s ease-in-out infinite; }
    .vita-info h3 { font-size: 1.0625rem; margin-bottom: 2px; }
    .vita-status { display: flex; align-items: center; gap: 6px; font-size: 0.8125rem; color: var(--accent); }
    .vita-status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 2s infinite; }

    .chat-quick-prompts { padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg-surface); display: flex; flex-wrap: wrap; gap: 8px; }
    .quick-prompt {
      padding: 6px 14px; border-radius: var(--radius-full); background: var(--bg-card);
      border: 1px solid var(--border); font-size: 0.8125rem; color: var(--text-secondary);
      cursor: pointer; transition: var(--transition); font-family: var(--font-sans);
    }
    .quick-prompt:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-subtle); }

    .chat-messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
    .chat-message { display: flex; gap: 12px; max-width: 85%; }
    .user-msg { flex-direction: row-reverse; align-self: flex-end; }
    .vita-msg  { align-self: flex-start; }

    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--gradient);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      font-size: 0.9rem; font-weight: 700; color: #fff;
    }
    .vita-msg .msg-avatar { background: var(--bg-card); border: 1px solid var(--border); font-size: 1rem; }

    .msg-bubble { display: flex; flex-direction: column; gap: 4px; }
    .msg-content {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 12px 16px; font-size: 0.9rem; line-height: 1.6; color: var(--text-primary);
    }
    .user-msg .msg-content { background: var(--primary); border-color: var(--primary); color: #fff; border-radius: var(--radius-lg) 4px var(--radius-lg) var(--radius-lg); }
    .vita-msg .msg-content  { border-radius: 4px var(--radius-lg) var(--radius-lg) var(--radius-lg); }
    .msg-time { font-size: 0.7rem; color: var(--text-muted); padding: 0 4px; }
    .user-msg .msg-time { text-align: right; }

    /* Typing animation */
    .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
    .typing-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); animation: typing 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    .chat-input-area {
      padding: 16px 20px; border-top: 1px solid var(--border); background: var(--bg-surface);
      display: flex; align-items: flex-end; gap: 10px;
    }
    #chatInput {
      flex: 1; background: var(--bg-input); border: 1.5px solid var(--border-solid);
      border-radius: var(--radius-lg); padding: 12px 16px; resize: none;
      font-family: var(--font-sans); font-size: 0.9375rem; color: var(--text-primary);
      outline: none; transition: var(--transition); max-height: 120px; line-height: 1.5;
    }
    #chatInput:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    #chatInput::placeholder { color: var(--text-muted); }
    #chatSendBtn { width: 44px; height: 44px; border-radius: 50%; background: var(--gradient); border: none; color: #fff; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
    #chatSendBtn:hover { transform: scale(1.1); box-shadow: 0 4px 16px var(--primary-glow); }
    #chatSendBtn:disabled { opacity: 0.5; transform: none; }

    /* ====  CHECK-IN TAB  ==== */
    .checkin-container { padding: 32px; max-width: 760px; }
    .checkin-wrapper  { display: flex; flex-direction: column; gap: 24px; }
    .checkin-header h2 { font-size: 1.6rem; margin-bottom: 6px; }

    .checkin-status-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl);
      padding: 24px 28px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
    }
    .checkin-status-icon { font-size: 2.8rem; flex-shrink: 0; }
    .checkin-status-info { flex: 1; }
    .checkin-status-info h3 { font-size: 1.125rem; margin-bottom: 4px; }
    .checkin-status-info p  { font-size: 0.9rem; color: var(--text-secondary); }

    .checkin-settings, .checkin-notify, .checkin-flow { padding: 24px; }
    .checkin-settings h3, .checkin-notify h3, .checkin-flow h3 { font-size: 1.0625rem; margin-bottom: 4px; }

    .checkin-flow { border: 1px solid var(--border); border-radius: var(--radius-xl); }
    .quick-checkin-intro, .quick-checkin-top {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; flex-wrap: wrap;
    }
    .mini-label {
      font-size: 0.72rem; color: var(--primary); font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .quick-checkin-chips, .quick-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    .quick-checkin-chips span {
      background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-full);
      color: var(--text-secondary); font-size: 0.78rem; font-weight: 700; padding: 7px 12px;
    }
    .quick-progress {
      height: 8px; border-radius: var(--radius-full); background: var(--bg-input); overflow: hidden;
      margin: 18px 0 20px;
    }
    .quick-progress span {
      display: block; height: 100%; border-radius: inherit; background: var(--gradient); transition: width 0.25s ease;
    }
    .quick-option {
      flex: 1 1 130px; min-height: 92px; border: 1.5px solid var(--border-solid); border-radius: var(--radius-lg);
      background: var(--bg-input); color: var(--text-primary); font-family: var(--font-sans);
      cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      transition: var(--transition); padding: 14px;
    }
    .quick-option span { font-size: 1.6rem; }
    .quick-option strong { font-size: 0.9rem; }
    .quick-option:hover, .quick-option.selected {
      border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 22px var(--primary-glow);
    }
    .quick-range { margin-top: 6px; }
    .quick-range input[type="range"] {
      width: 100%; accent-color: var(--primary); cursor: pointer;
    }
    .quick-range .range-labels {
      display: flex; justify-content: space-between; margin-top: 8px;
      color: var(--text-muted); font-size: 0.78rem;
    }
    .quick-range .range-value {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 64px; margin-top: 10px; padding: 6px 10px;
      border-radius: var(--radius-full); background: var(--primary-subtle);
      color: var(--primary); font-weight: 800; font-size: 0.82rem;
    }
    .quick-note { margin-top: 4px; width: 100%; }
    .quick-checkin-actions { display: flex; justify-content: space-between; gap: 10px; margin-top: 18px; }
    .quick-checkin-complete { text-align: center; padding: 20px 8px; }
    .loading-orb.compact { width: 48px; height: 48px; margin: 0 auto 14px; }

    .freq-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .freq-btn {
      padding: 9px 18px; border-radius: var(--radius-full);
      background: var(--bg-input); border: 1.5px solid var(--border-solid);
      font-size: 0.875rem; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; transition: var(--transition); font-family: var(--font-sans);
    }
    .freq-btn:hover  { border-color: var(--primary); color: var(--primary); }
    .freq-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    .checkin-notify { border: 1px solid var(--border); border-radius: var(--radius-xl); }

    .report-history h3 { font-size: 1.0625rem; margin-bottom: 16px; }
    .history-list { display: flex; flex-direction: column; gap: 12px; }
    .history-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 16px 20px; display: flex; align-items: center; gap: 16px;
    }
    .history-rank { font-family: var(--font-display); font-size: 1.2rem; font-weight: 800; color: var(--text-muted); min-width: 28px; }
    .history-info { flex: 1; }
    .history-info strong { font-size: 0.9375rem; display: block; margin-bottom: 2px; }
    .score-ring-sm {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: conic-gradient(from 0deg, #6C63FF 0%, #00D9A7 calc(var(--s, 70) * 3.6deg), var(--border-solid) calc(var(--s, 70) * 3.6deg));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-weight: 800; font-size: 0.8rem; color: var(--text-primary);
      position: relative;
    }
    .score-ring-sm::before { content: ''; position: absolute; inset: 7px; border-radius: 50%; background: var(--bg-card); }
    .score-ring-sm > * { position: relative; z-index: 1; }

    .empty-history { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 28px; text-align: center; }

    .consistency-tips { padding: 22px 24px; }
    .consistency-tips h3 { font-size: 1.0625rem; margin-bottom: 14px; }
    .tips-list { display: flex; flex-direction: column; gap: 10px; }
    .tips-list li { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; }

    /* ====  NUDGE BANNER  ==== */
    .nudge-banner {
      background: var(--bg-surface); border-bottom: 1px solid var(--border);
      padding: 12px 24px; position: sticky; top: 64px; z-index: 90;
    }
    .nudge-content { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .nudge-icon { font-size: 1.4rem; flex-shrink: 0; }
    .nudge-content > div { flex: 1; }
    .nudge-content strong { font-size: 0.9375rem; display: block; margin-bottom: 2px; }
    .nudge-content p { font-size: 0.8125rem; color: var(--text-secondary); }
    .nudge-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ====  API KEY PROMPT  ==== */
    .api-prompt-bar {
      background: var(--accent-subtle); border: 1px solid rgba(0,217,167,0.25);
      border-radius: var(--radius); padding: 14px 18px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .api-prompt-bar p { flex: 1; font-size: 0.875rem; color: var(--text-secondary); }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .dash-content { margin-left: 0; }
      .dash-nav { padding: 0 14px; }
      .report-container, .checkin-container { padding: 16px; }
      .chat-messages { padding: 16px 12px; }
      .chat-message { max-width: 96%; }
      .quick-checkin-intro > .btn, .quick-checkin-top > .btn { width: 100%; }
    }
    .menu-btn { display: none; }
    @media (max-width: 768px) { .menu-btn { display: flex; } }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="dash-nav" aria-label="Main navigation">
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn btn-ghost btn-icon menu-btn" id="menuBtn" aria-label="Toggle menu" onclick="toggleSidebar()">☰</button>
    <a href="index.html" class="dash-logo" aria-label="Fitnessify AI Home">
      <img src="assets/fit.jpg" alt="Fitnessify AI logo" class="logo-mark" />
      <span>Fitnessify <span class="gradient-text">AI</span></span>
    </a>
  </div>
  <div class="nav-user">
    <button data-theme-toggle class="btn btn-ghost btn-icon" title="Toggle theme"></button>
    <div class="user-avatar" id="navAvatar" aria-hidden="true">U</div>
    <div class="hide-mobile">
      <div class="user-name" id="navUserName">Loading…</div>
      <div class="user-sub">Wellness Member</div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="AuthManager.logout()" aria-label="Log out">Logout</button>
  </div>
</nav>

<div class="dash-body">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Dashboard navigation">
    <span class="sidebar-label">Main</span>

    <button class="sidebar-item active" id="tab-report" onclick="openTab('report')" aria-label="View wellness report">
      <span class="s-icon">📊</span> My Report
    </button>
    <button class="sidebar-item" id="tab-chat" onclick="openTab('chat')" aria-label="Chat with Vita">
      <span class="s-icon">💬</span> Chat with Vita
      <span class="sidebar-tag">AI</span>
    </button>
    <button class="sidebar-item" id="tab-checkin" onclick="openTab('checkin')" aria-label="Check-in center">
      <span class="s-icon">📅</span> Check-Ins
    </button>

    <span class="sidebar-label">Account</span>
    <button class="sidebar-item" onclick="openTab('report'); document.getElementById('downloadReportBtn')?.click()" aria-label="Download report PDF">
      <span class="s-icon">⬇️</span> Download PDF
    </button>
    <button class="sidebar-item" onclick="generateNewReport()" aria-label="Refresh report">
      <span class="s-icon">✨</span> Refresh Report
    </button>
    <a href="onboarding.html" class="sidebar-item" aria-label="Update wellness profile">
      <span class="s-icon">✏️</span> Update Profile
    </a>

    <div class="sidebar-bottom">
      <button class="sidebar-item" onclick="AuthManager.logout()" aria-label="Log out">
        <span class="s-icon">🚪</span> Logout
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="dash-content" id="dashMain">

    <!-- REPORT TAB -->
    <div class="tab-panel active" id="panel-report" role="tabpanel" aria-label="Report panel">
      <div class="report-container">
        <div id="reportContent"></div>
      </div>
    </div>

    <!-- CHAT TAB -->
    <div class="tab-panel" id="panel-chat" role="tabpanel" aria-label="Chat with Vita panel">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-header-inner">
            <div class="vita-bubble" aria-hidden="true">🤖</div>
            <div class="vita-info">
              <h3>Chat with Vita</h3>
              <div class="vita-status">Online — Ready to help</div>
            </div>
          </div>
        </div>

        <div class="chat-quick-prompts" role="group" aria-label="Quick questions">
          <span style="font-size:0.8rem;color:var(--text-muted);align-self:center">Quick asks:</span>
          <button class="quick-prompt" data-prompt="How much water should I drink per day?" aria-label="Ask about water intake">💧 Water intake</button>
          <button class="quick-prompt" data-prompt="What are some high-protein breakfast ideas that are quick to make?" aria-label="Ask about protein breakfast">🍳 Protein breakfast</button>
          <button class="quick-prompt" data-prompt="How can I reduce my stress levels naturally?" aria-label="Ask about stress reduction">🧘 Stress tips</button>
          <button class="quick-prompt" data-prompt="What's the best way to improve sleep quality?" aria-label="Ask about sleep quality">😴 Better sleep</button>
          <button class="quick-prompt" data-prompt="How do I exercise when I have a busy schedule and no time for gym?" aria-label="Ask about exercise without gym">🏃 No-gym workouts</button>
        </div>

        <div class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-relevant="additions"></div>

        <div class="chat-input-area">
          <textarea id="chatInput" placeholder="Ask Vita anything about nutrition, exercise, hydration, sleep…" rows="1" aria-label="Type your message"></textarea>
          <button id="chatSendBtn" aria-label="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- CHECK-IN TAB -->
    <div class="tab-panel" id="panel-checkin" role="tabpanel" aria-label="Check-in panel">
      <div class="checkin-container">
        <div id="checkinContent"></div>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="toast-container" role="status" aria-live="polite"></div>

<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/report.js"></script>
<script src="js/chat.js"></script>
<script src="js/pdf.js"></script>
<script src="js/checkin.js"></script>
<script>
  let chatInitialized   = false;
  let checkinRendered   = false;
  const urlParams       = new URLSearchParams(window.location.search);
  const isNewUser       = urlParams.get('new') === '1';

  // ---- Init ----
  document.addEventListener('DOMContentLoaded', async () => {
    const user = await AuthManager.requireAuth();
    if (!user) return;

    // Populate nav user info
    document.getElementById('navAvatar').textContent   = user.name.charAt(0).toUpperCase();
    document.getElementById('navUserName').textContent = user.name.split(' ')[0];

    // Check-in nudge
    window._reportUser = user;
    window._reportHistory = await AuthManager.getReports();
    CheckInManager.init();
    checkAiStatus();

    // Load report
    if (isNewUser) {
      await generateNewReport();
    } else {
      await ReportManager.renderFromSaved('reportContent');
    }
  });

  async function checkAiStatus() {
    try {
      const status = await AuthManager.getAiStatus();
      if (!status.connected) {
        showToast(status.message || 'Vita is using offline fallback replies until live AI is configured.', 'warning', 7000);
      }
    } catch {
      // Keep the dashboard usable even if the status check is unavailable.
    }
  }

  async function generateNewReport() {
    // Animate loading steps
    const steps = ['ls1','ls2','ls3','ls4'];
    let si = 0;
    document.getElementById('reportContent').innerHTML = ReportManager.renderLoading();
    const stepTimer = setInterval(() => {
      if (si < steps.length - 1) {
        const el = document.getElementById(steps[si]);
        if (el) el.classList.remove('active');
        si++;
        const next = document.getElementById(steps[si]);
        if (next) next.classList.add('active');
      }
    }, 3500);

    const report = await ReportManager.generate('reportContent');
    clearInterval(stepTimer);
    window._reportData = report?.data || null;
    window._reportUser = await AuthManager.getCurrentUser(true);
    window._reportHistory = await AuthManager.getReports();

    setTimeout(() => showToast('Your wellness report is ready! Download it as PDF or chat with Vita. 🎉', 'success'), 500);
  }

  // ---- Tab Navigation ----
  function openTab(tab) {
    ['report','chat','checkin'].forEach(t => {
      document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
      document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });

    if (tab === 'chat' && !chatInitialized) {
      ChatManager.init('chatInput', 'chatMessages');
      chatInitialized = true;
    }

    if (tab === 'checkin' && !checkinRendered) {
      CheckInManager.renderHistoryTab('checkinContent');
      checkinRendered = true;
    }

    // Close mobile sidebar
    const sidebar = document.getElementById('sidebar');
    if (sidebar.classList.contains('open')) sidebar.classList.remove('open');
  }

  // ---- Sidebar mobile ----
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }
</script>
</body>
</html>
